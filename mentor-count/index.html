<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mentara - Mentor Count</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:      #0D4F5C;
      --primary-dark: #083540;
      --primary-glow: rgba(13, 79, 92, 0.30);
      --accent:       #C98B30;
      --accent-glow:  rgba(201, 139, 48, 0.35);
      --bg:           #FAF7F2;
      --dark:         #1A1410;
      --gray700:      #5C5248;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    /* ---- canvas for confetti ---- */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    /* ---- main layout ---- */
    .scene {
      position: relative;
      width: 100vw; height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    /* ---- ambient glows ---- */
    .glow-tl {
      position: absolute;
      top: -120px; left: -120px;
      width: 520px; height: 520px;
      background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
      pointer-events: none;
    }
    .glow-br {
      position: absolute;
      bottom: -100px; right: -100px;
      width: 460px; height: 460px;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ---- logo wordmark ---- */
    .logo {
      font-family: 'Playfair Display', serif;
      font-weight: 800;
      font-size: clamp(18px, 3vw, 26px);
      color: var(--primary);
      letter-spacing: -0.3px;
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeUp 0.7s 0.2s ease forwards;
    }
    .logo span {
      color: var(--accent);
    }

    /* ---- the big number card ---- */
    .card {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #FFFFFF;
      border-radius: 28px;
      padding: 56px 80px 48px;
      box-shadow:
        0 2px 8px rgba(26,20,16,0.06),
        0 8px 32px rgba(26,20,16,0.10),
        0 0 0 1.5px rgba(229, 222, 214, 0.9);
      opacity: 0;
      transform: translateY(24px) scale(0.96);
      animation: cardIn 0.75s 0.45s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    /* golden top bar */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 72px; height: 4px;
      background: linear-gradient(90deg, var(--accent), #E8A84A);
      border-radius: 0 0 4px 4px;
    }

    .label-top {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: clamp(10px, 1.2vw, 12px);
      letter-spacing: 1.6px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }

    .count {
      font-family: 'Playfair Display', serif;
      font-weight: 800;
      font-size: clamp(160px, 22vw, 260px);
      line-height: 1;
      color: var(--primary);
      letter-spacing: -6px;
      position: relative;
      /* subtle teal glow on the number */
      text-shadow:
        0 0 60px rgba(13,79,92,0.18),
        0 4px 24px rgba(13,79,92,0.12);
    }

    /* gold shine sweep */
    .count::after {
      content: '1';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        120deg,
        transparent 20%,
        rgba(201,139,48,0.18) 45%,
        rgba(232,168,74,0.22) 50%,
        rgba(201,139,48,0.10) 55%,
        transparent 80%
      );
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shine 3.5s 1.4s ease-in-out infinite;
      background-size: 200% 100%;
    }

    .label-bottom {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: clamp(15px, 2vw, 18px);
      color: var(--gray700);
      margin-top: 18px;
      letter-spacing: 0.1px;
    }

    .label-bottom strong {
      color: var(--primary);
      font-weight: 700;
    }

    /* ---- pulse ring around card ---- */
    .pulse-ring {
      position: absolute;
      inset: -16px;
      border-radius: 40px;
      border: 2px solid rgba(13,79,92,0.18);
      animation: pulseRing 2.4s 1.2s ease-out infinite;
      pointer-events: none;
    }

    /* ---- tagline below card ---- */
    .tagline {
      margin-top: 32px;
      font-family: 'Inter', sans-serif;
      font-size: clamp(13px, 1.6vw, 15px);
      color: var(--gray700);
      letter-spacing: 0.2px;
      opacity: 0;
      animation: fadeUp 0.6s 1.1s ease forwards;
    }

    /* ---- keyframes ---- */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes pulseRing {
      0%   { transform: scale(1);    opacity: 0.7; }
      70%  { transform: scale(1.04); opacity: 0; }
      100% { transform: scale(1.04); opacity: 0; }
    }
    @keyframes shine {
      0%   { background-position: -200% center; }
      40%  { background-position: 200%  center; }
      100% { background-position: 200%  center; }
    }
  </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="scene">
  <div class="glow-tl"></div>
  <div class="glow-br"></div>

  <div class="logo">Mentar<span>a</span></div>

  <div class="card">
    <div class="pulse-ring"></div>
    <div class="label-top">Mentors who said yes</div>
    <div class="count">1</div>
    <div class="label-bottom">and <strong>growing</strong></div>
  </div>

  <div class="tagline">Be the mentor you wish you had.</div>
</div>

<script>
/* ============================================================
   Confetti engine - no external deps
   Colors: Mentara palette (teal, gold, terracotta, sage, indigo)
   ============================================================ */
(function () {
  const COLORS = [
    '#0D4F5C', '#1A7A8A', '#3D8A99',   // teal family
    '#C98B30', '#E8A84A', '#F5C87A',   // gold family
    '#B8491A', '#CC5A28',               // terracotta
    '#3D7A5B', '#5A9E7A',               // sage
    '#4A3B7C', '#6B5BA8',               // indigo
    '#FAF7F2',                          // cream (subtle)
  ];

  const canvas = document.getElementById('confetti-canvas');
  const ctx    = canvas.getContext('2d');
  let W, H, particles = [], animId;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function rand(min, max) { return Math.random() * (max - min) + min; }

  function createParticle(fromTop) {
    const shapes = ['rect', 'circle', 'ribbon'];
    return {
      x:       rand(0, W),
      y:       fromTop ? rand(-60, -10) : rand(-H * 0.4, 0),
      w:       rand(6, 14),
      h:       rand(4, 9),
      color:   COLORS[Math.floor(Math.random() * COLORS.length)],
      shape:   shapes[Math.floor(Math.random() * shapes.length)],
      vx:      rand(-1.4, 1.4),
      vy:      rand(2.2, 5.5),
      vr:      rand(-0.08, 0.08),
      angle:   rand(0, Math.PI * 2),
      opacity: rand(0.7, 1),
      decay:   rand(0.992, 0.999),
      wobble:  rand(0, Math.PI * 2),
      wobbleS: rand(0.05, 0.12),
    };
  }

  function burst(count) {
    for (let i = 0; i < count; i++) {
      const p = createParticle(false);
      p.x  = rand(W * 0.2, W * 0.8);
      p.vy = rand(-14, -5);
      p.vx = rand(-6, 6);
      particles.push(p);
    }
  }

  function rain(count) {
    for (let i = 0; i < count; i++) {
      particles.push(createParticle(true));
    }
  }

  function draw(p) {
    ctx.save();
    ctx.globalAlpha = p.opacity;
    ctx.fillStyle   = p.color;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.angle);

    if (p.shape === 'circle') {
      ctx.beginPath();
      ctx.ellipse(0, 0, p.w / 2, p.h / 2, 0, 0, Math.PI * 2);
      ctx.fill();
    } else if (p.shape === 'ribbon') {
      ctx.beginPath();
      ctx.moveTo(-p.w / 2, 0);
      ctx.bezierCurveTo(-p.w / 4, -p.h, p.w / 4, p.h, p.w / 2, 0);
      ctx.bezierCurveTo(p.w / 4, p.h, -p.w / 4, -p.h, -p.w / 2, 0);
      ctx.fill();
    } else {
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    }
    ctx.restore();
  }

  function update(p) {
    p.wobble += p.wobbleS;
    p.vx     += Math.sin(p.wobble) * 0.06;
    p.vy     += 0.12;                   // gravity
    p.x      += p.vx;
    p.y      += p.vy;
    p.angle  += p.vr;
    p.opacity *= p.decay;
  }

  function loop() {
    ctx.clearRect(0, 0, W, H);
    particles = particles.filter(p => p.y < H + 60 && p.opacity > 0.03);
    particles.forEach(p => { update(p); draw(p); });
    animId = requestAnimationFrame(loop);
  }

  /* --- schedule sequence --- */
  // first burst right as card animates in
  setTimeout(() => burst(120), 800);
  // second burst for extra pop
  setTimeout(() => burst(80),  1400);
  // continuous gentle rain for video duration
  setTimeout(() => {
    setInterval(() => rain(5), 250);
  }, 1600);

  loop();

  /* click anywhere for bonus burst */
  document.addEventListener('click', () => burst(90));
})();
</script>
</body>
</html>
